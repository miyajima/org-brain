name = "open-brain-org-router"
main = "src/index.ts"
compatibility_date = "2026-03-03"

[[d1_databases]]
binding = "OPEN_BRAIN_DB"
database_name = "open-brain"
database_id = "0a34b2a0-27f8-4d18-9a12-8ef218670842"

[[queues.consumers]]
queue = "org-bus"
max_batch_size = 10
max_batch_timeout = 5
dead_letter_queue = "org-bus-dlq"
max_retries = 5

[[queues.producers]]
binding = "CAP_PLAN_OUT"
queue = "cap-plan"
