name = "open-brain-api-gateway"
main = "src/index.ts"
compatibility_date = "2026-03-03"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "OPEN_BRAIN_DB"
database_name = "open-brain"
database_id = "0a34b2a0-27f8-4d18-9a12-8ef218670842"

[[r2_buckets]]
binding = "OPEN_BRAIN_BUCKET"
bucket_name = "open-brain-bucket"

[[queues.producers]]
binding = "ORG_BUS_OUT"
queue = "org-bus"

[durable_objects]
bindings = [
  { name = "MCP_OBJECT", class_name = "OrgBrainMCP" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["OrgBrainMCP"]

[[workflows]]
name = "spec-to-code"
binding = "WF_SPEC2CODE"
class_name = "SpecToCodeWorkflow"
script_name = "open-brain-orchestrator"
